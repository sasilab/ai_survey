<style>
/* ── reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --surface: #fdf5fa;
  --border: #e8e0e8;
  --text: #0f0f0f;
  --muted: #737373;
  --accent: #e8186d;
  --accent-light: #fce8f3;
  --accent-inv: #ffffff;
  --blue-dot: #3b7bd4;
  --danger: #c0392b;
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --tamil-font: 'Noto Sans Tamil', 'Latha', 'Tamil MN', sans-serif;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── progress bar ── */
#progress-bar {
  position: fixed; top: 0; left: 0;
  height: 3px; background: var(--accent);
  transition: width .4s ease; z-index: 100;
  border-radius: 0 2px 2px 0;
}

/* ── top bar ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px 0;
  z-index: 99;
  pointer-events: none;
}
#q-counter { font-size: 12px; color: var(--muted); pointer-events: none; }
#lang-switcher {
  display: flex; gap: 6px; pointer-events: all;
}
.lang-btn {
  padding: 4px 12px; border-radius: 20px; font-size: 11.5px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--muted); cursor: pointer;
  transition: all .15s; font-family: var(--font);
}
.lang-btn.active {
  background: var(--accent); color: var(--accent-inv);
  border-color: var(--accent);
}
.lang-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* ── main stage ── */
#stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 72px 24px 80px;
  overflow: hidden;
}

/* ── slide ── */
.slide {
  position: absolute;
  width: 100%; max-width: 640px;
  opacity: 0; pointer-events: none;
  transform: translateY(24px);
  transition: opacity .28s ease, transform .28s ease;
  will-change: transform, opacity;
}
.slide.active {
  opacity: 1; pointer-events: all;
  transform: translateY(0);
}
.slide.exit-up   { opacity: 0; transform: translateY(-28px); }
.slide.exit-down { opacity: 0; transform: translateY(28px); }

/* ── sketch zone ── */
.sketch-zone {
  width: 100%; margin-bottom: 28px;
  border-radius: var(--radius); overflow: hidden;
  min-height: 140px;
  display: flex; align-items: center; justify-content: center;
}
.sketch-zone img {
  width: 100%; display: block;
  border-radius: var(--radius);
}
.sketch-zone.placeholder {
  border: 2px dashed #f0c0d8;
  background: #fdf0f7; min-height: 140px;
  flex-direction: column; gap: 8px;
}
.sketch-zone.placeholder::after {
  font-size: 12px; color: var(--muted);
  text-align: center; padding: 0 16px;
}

/* cover sketch */
.sketch-cover { min-height: 180px; margin-bottom: 32px; }
.sketch-cover.placeholder::after { content: '🎨  sketches/cover.png  (1200×360px)'; }
.sketch-s1.placeholder::after  { content: '🎨  sketches/section-1.png  (800×200px)'; }
.sketch-s2.placeholder::after  { content: '🎨  sketches/section-2.png  (800×200px)'; }
.sketch-s3.placeholder::after  { content: '🎨  sketches/section-3.png  (800×200px)'; }
.sketch-s4.placeholder::after  { content: '🎨  sketches/section-4.png  (800×200px)'; }
.sketch-s5.placeholder::after  { content: '🎨  sketches/section-5.png  (800×200px)'; }
.sketch-s6.placeholder::after  { content: '🎨  sketches/section-6.png  (800×200px)'; }
.sketch-s7.placeholder::after  { content: '🎨  sketches/section-7.png  (800×200px)'; }
.sketch-s8.placeholder::after  { content: '🎨  sketches/section-8.png  (800×200px)'; }

/* ── section label ── */
.sec-label {
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}

/* ── question text ── */
.q-text {
  font-size: clamp(20px, 4vw, 27px);
  font-weight: 600; line-height: 1.38;
  color: var(--text); margin-bottom: 8px;
}
.q-sub {
  font-size: 14px; color: var(--muted);
  line-height: 1.6; margin-bottom: 24px;
}
.q-text.ta, .q-sub.ta, .opt-label.ta {
  font-family: var(--tamil-font);
}

/* ── options ── */
.opts { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--bg);
  cursor: pointer; transition: all .14s;
  font-size: 15px; color: var(--text); text-align: left;
  width: 100%; font-family: var(--font);
}
.opt.ta { font-family: var(--tamil-font); font-size: 14px; }
.opt:hover { border-color: var(--accent); background: var(--accent-light); }
.opt.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #ffffff;
}
.opt-circle {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid currentColor; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .14s;
}
.opt-sq {
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid currentColor; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.opt.selected .opt-circle {
  border-color: rgba(255,255,255,0.85);
}
.opt.selected .opt-circle::after {
  content: ''; width: 7px; height: 7px;
  border-radius: 50%; background: #ffffff;
}
.opt.selected .opt-sq {
  border-color: rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.2);
}
.opt.selected .opt-sq::after {
  content: '✓'; font-size: 11px; line-height: 1; color: #ffffff;
}
.opt-label { flex: 1; line-height: 1.45; }

/* scale */
.scale-wrap { margin-top: 20px; }
.scale-row { display: flex; gap: 8px; flex-wrap: wrap; }
.scale-btn {
  width: 52px; height: 52px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--bg);
  font-size: 16px; font-weight: 500; cursor: pointer;
  transition: all .14s; color: var(--text); font-family: var(--font);
}
.scale-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.scale-btn.selected {
  background: var(--accent); color: var(--accent-inv);
  border-color: var(--accent);
}
.scale-labels {
  display: flex; justify-content: space-between;
  margin-top: 8px; font-size: 12px; color: var(--muted);
}
.scale-labels.ta { font-family: var(--tamil-font); font-size: 11px; }

/* textarea */
.q-textarea {
  width: 100%; margin-top: 20px;
  padding: 14px 16px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 15px; font-family: var(--font); color: var(--text);
  resize: none; min-height: 120px; line-height: 1.6;
  transition: border-color .14s;
}
.q-textarea:focus { outline: none; border-color: var(--accent); }

/* pink dot accent on section label */
.sec-label::before {
  content: ''; display: inline-block;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); margin-right: 6px;
  vertical-align: middle; margin-top: -2px;
}

/* ── bottom bar ── */
#bottombar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
}
#btn-back {
  font-size: 13px; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 8px 0;
  font-family: var(--font);
}
#btn-back:hover { color: var(--text); }
#btn-next {
  padding: 13px 28px; border-radius: var(--radius);
  background: var(--accent); color: var(--accent-inv);
  border: none; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font);
  transition: opacity .15s, transform .1s;
}
#btn-next:hover { opacity: .85; }
#btn-next:active { transform: scale(.98); }
#enter-hint {
  font-size: 11.5px; color: #bbb;
  position: fixed; bottom: 64px; right: 24px;
}

/* ── trap badge ── */
.trap-badge {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 6px; background: #fff3e0; color: #b85c00;
  font-weight: 600; margin-bottom: 10px; letter-spacing: .04em;
}

/* ── welcome / thank-you slides ── */
.cover-title {
  font-size: clamp(26px, 5vw, 36px);
  font-weight: 700; line-height: 1.25; margin-bottom: 12px;
}
.cover-sub {
  font-size: 16px; color: var(--muted); line-height: 1.7;
  margin-bottom: 28px;
}
.cover-sub.ta { font-family: var(--tamil-font); }
.start-btn {
  padding: 15px 36px; border-radius: var(--radius);
  background: var(--accent); color: var(--accent-inv);
  border: none; font-size: 16px; font-weight: 500;
  cursor: pointer; font-family: var(--font);
  transition: opacity .15s;
}
.start-btn:hover { opacity: .85; }
.done-icon { font-size: 48px; margin-bottom: 16px; }

/* ── error ── */
#err-msg {
  font-size: 13px; color: var(--danger);
  min-height: 18px; margin-top: 10px;
}

/* ── mobile tweaks ── */
@media (max-width: 480px) {
  #stage { padding: 64px 16px 72px; }
  .scale-btn { width: 46px; height: 46px; font-size: 14px; }
  #topbar { padding: 14px 16px 0; }
  #bottombar { padding: 14px 16px; }
  .lang-btn { padding: 3px 9px; font-size: 11px; }
}
</style>
</head>

function buildAll() {
  stage.innerHTML = SLIDES.map((s, i) => renderSlide(s, i)).join('');
}

function showSlide(idx, dir) {
  const slides = stage.querySelectorAll('.slide');
  const prev = stage.querySelector('.slide.active');

  if (prev) {
    prev.classList.remove('active');
    prev.classList.add(dir > 0 ? 'exit-up' : 'exit-down');
    setTimeout(() => prev.classList.remove('exit-up', 'exit-down'), 300);
  }

  const next = slides[idx];
  if (next) {
    next.style.transform = dir > 0 ? 'translateY(28px)' : 'translateY(-28px)';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        next.style.transform = '';
        next.classList.add('active');
      });
    });
  }

  updateUI(idx);
}

function updateUI(idx) {
  const s = SLIDES[idx];
  const isSpecial = s.type === 'welcome' || s.type === 'done';
  const total = SLIDES.filter(x => x.type !== 'welcome' && x.type !== 'done').length;
  const qNum  = SLIDES.slice(1, idx).filter(x => x.type !== 'done').length;

  // progress
  const pct = isSpecial ? (s.type==='done' ? 100 : 0) : Math.round((qNum / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';

  // counter
  const ctr = document.getElementById('q-counter');
  if (isSpecial) { ctr.textContent = ''; }
  else { ctr.textContent = `${qNum} / ${total}`; }

  // bottom bar
  const bb = document.getElementById('bottombar');
  const hint = document.getElementById('enter-hint');
  bb.style.display = isSpecial ? 'none' : 'flex';
  hint.style.display = isSpecial ? 'none' : 'block';

  document.getElementById('err-msg').textContent = '';

  // back button
  document.getElementById('btn-back').style.visibility = idx <= 1 ? 'hidden' : 'visible';

  // next button text
  const btn = document.getElementById('btn-next');
  const isLast = SLIDES[idx+1]?.type === 'done';
  if (lang === 'ta') btn.textContent = isLast ? 'சமர்ப்பிக்க →' : 'அடுத்து →';
  else if (lang === 'tg') btn.textContent = isLast ? 'Submit பண்ணு →' : 'அடுத்து →';
  else btn.textContent = isLast ? 'Submit →' : 'Next →';
}

/* ══════════════════════════════════════════════════════════════
   INTERACTIONS
══════════════════════════════════════════════════════════════ */
window.pick = function(v) {
  answers[SLIDES[cur].id] = v;
  const s = SLIDES[cur];
  // CRITICAL: scope to current slide only — not all slides in DOM
  const slide = document.getElementById('slide-' + cur);
  if (!slide) return;
  if (s.type === 'radio') {
    slide.querySelectorAll('.opt').forEach((el, i) => {
      el.classList.toggle('selected', i === v);
    });
  } else if (s.type === 'scale') {
    slide.querySelectorAll('.scale-btn').forEach((el, i) => {
      el.classList.toggle('selected', (i + 1) === v);
    });
  }
  document.getElementById('err-msg').textContent = '';
};

window.tog = function(i) {
  const s = SLIDES[cur];
  let arr = answers[s.id] || [];
  const idx = arr.indexOf(i);
  if (idx >= 0) {
    arr.splice(idx, 1);
  } else {
    if (s.maxSelect && arr.length >= s.maxSelect) return;
    arr.push(i);
  }
  answers[s.id] = [...arr];
  // CRITICAL: scope to current slide only
  const slide = document.getElementById('slide-' + cur);
  if (!slide) return;
  slide.querySelectorAll('.opt').forEach((el, j) => {
    el.classList.toggle('selected', arr.includes(j));
  });
  document.getElementById('err-msg').textContent = '';
};

window.pickOther = function() {
  const s = SLIDES[cur];
  const wasOther = typeof answers[s.id] === 'string' && answers[s.id].startsWith('__other__');
  answers[s.id] = wasOther ? undefined : '__other__';
  // re-render opts
  const slide = document.getElementById('slide-' + cur);
  const allOpts = slide ? slide.querySelectorAll('.opt') : [];
  allOpts.forEach((el, i) => {
    if (i < s.opts.length) el.classList.toggle('selected', false);
    else el.classList.toggle('selected', !wasOther);
  });
  // re-render slide to show/hide text input
  const el = document.getElementById('slide-'+cur);
  if (el) { el.outerHTML = renderSlide(s, cur); showSlide(cur, 0); }
  setTimeout(() => {
    const inp = document.getElementById('other-input');
    if (inp) inp.focus();
  }, 80);
};

window.saveOther = function() {
  const inp = document.getElementById('other-input');
  if (inp) answers[SLIDES[cur].id] = '__other__' + inp.value;
};

window.togOther = function() {
  const s = SLIDES[cur];
  let arr = answers[s.id] || [];
  const hasIt = arr.includes('other');
  if (hasIt) {
    arr = arr.filter(x => x !== 'other');
    delete answers[s.id + '_other'];
  } else {
    arr.push('other');
  }
  answers[s.id] = [...arr];
  const el = document.getElementById('slide-'+cur);
  if (el) { el.outerHTML = renderSlide(s, cur); showSlide(cur, 0); }
  setTimeout(() => {
    const inp = document.getElementById('other-check-input');
    if (inp) inp.focus();
  }, 80);
};

window.saveOtherCheck = function() {
  const inp = document.getElementById('other-check-input');
  if (inp) answers[SLIDES[cur].id + '_other'] = inp.value;
};

window.saveText = function() {
  const s = SLIDES[cur];
  const ta = document.getElementById(`ta-${s.id}`);
  if (ta) answers[s.id] = ta.value;
};

window.next = function() {
  const s = SLIDES[cur];

  // save textarea
  if (s.type === 'text') {
    const ta = document.getElementById(`ta-${s.id}`);
    if (ta) answers[s.id] = ta.value;
  }

  // validate
  const ans = answers[s.id];
  const empty = ans === undefined || ans === null
    || (Array.isArray(ans) && ans.length === 0)
    || (s.type === 'text' && !ans && !s.optional);

  if (empty && !s.optional && s.type !== 'text' && s.type !== 'welcome') {
    const msg = lang === 'ta' ? 'பதில் அளிக்கவும்.'
              : lang === 'tg' ? 'Answer பண்ணிட்டு போங்க.'
              : 'Please answer before continuing.';
    document.getElementById('err-msg').textContent = msg;
    return;
  }

  // trap flag
  if (s.trap === 'attention' && ans !== s.correctIdx) {
    if (!flags.includes('trap')) flags.push('trap');
  }

  // last question — submit
  if (SLIDES[cur + 1]?.type === 'done') {
    submitAnswers();
    return;
  }

  cur++;
  // re-render current slide (language may differ if user switched)
  const el = document.getElementById(`slide-${cur}`);
  if (el) el.outerHTML = renderSlide(SLIDES[cur], cur);
  showSlide(cur, 1);
};

window.go = function(dir) {
  if (dir < 0 && cur <= 1) return;
  cur += dir;
  cur = Math.max(1, Math.min(SLIDES.length - 2, cur));
  const el = document.getElementById(`slide-${cur}`);
  if (el) el.outerHTML = renderSlide(SLIDES[cur], cur);
  showSlide(cur, dir);
};

/* ── language switch ── */
window.setLang = function(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // re-render current slide
  const el = stage.querySelector(`#slide-${cur}`);
  if (el) {
    const newHTML = renderSlide(SLIDES[cur], cur);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHTML;
    el.outerHTML = newHTML;
    showSlide(cur, 0);
    // restore opacity immediately (no transition on lang switch)
    const newEl = document.getElementById(`slide-${cur}`);
    if (newEl) {
      newEl.style.transition = 'none';
      newEl.classList.add('active');
      setTimeout(() => newEl.style.transition = '', 50);
    }
  }
  updateUI(cur);
};

/* ── keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const ta = document.activeElement?.tagName === 'TEXTAREA';
    if (!ta) { e.preventDefault(); next(); }
  }
  if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
    if (document.activeElement?.tagName !== 'INPUT' &&
        document.activeElement?.tagName !== 'TEXTAREA') {
      go(-1);
    }
  }
});

/* ══════════════════════════════════════════════════════════════
   SUBMIT TO APPWRITE
══════════════════════════════════════════════════════════════ */
async function submitAnswers() {
  // check flags
  const secs = Math.round((Date.now() - startTime) / 1000);
  if (secs < 180) flags.push('fast');
  // contradiction: Q3 (never used AI) but Q25 comfort >= 3
  const q3 = answers[3], q25 = answers[25];
  if ((q3 === 2 || q3 === 3) && q25 >= 3) flags.push('contradiction');

  const doc = {
    q1_age:               optVal(1), q2_occupation:     optVal(2),
    q3_used_ai:           optVal(3), q4_device:         optVal(6),
    q5_language:          optVal(5), q6_location:       optVal(3),
    q7_smartphone:        answers[7] || 0,
    q8_apps:              arrVal(8),
    q9_internet:          optVal(9),
    q10_heard_from:       optVal(10),
    q11_tools_tried:      arrVal(11),
    q12_what_happened:    optVal(12),
    q13_first_reaction:   optVal(13),
    q7_trap_pass:         answers['ac'] === 1,
    q14_ai_help:          arrVal(14),
    q15_importance:       answers[15] || 0,
    q16_career_belief:    answers[16] || 0,
    q17_usage_freq:       optVal(17),
    q18_ai_tasks:         arrVal(18),
    q19_barriers:         arrVal(19),
    q20_lang_barrier:     answers[20] || 0,
    q21_reverse:          answers[21] || 0,
    q22_embarrassed:      answers[22] || 0,
    q23_tutorial_likely:  answers[23] || 0,
    q24_trust_factors:    arrVal(24),
    q25_ai_comfort:       answers[25] || 0,
    q26_online_learning:  optVal(26),
    q27_dropout_reason:   arrVal(27),
    q28_topics:           arrVal(28),
    q29_content_type:     arrVal(29),
    q30_share_trigger:    arrVal(30),
    q31_open_text:        answers[31] || '',
    q32_open_english:     answers[32] || '',
    lang,
    duration_secs:        secs,
    flags:                flags.join(','),
    submitted_at:         new Date().toISOString(),
  };

  try {
    const { Client, Databases, ID } = Appwrite;
    const client = new Client()
      .setEndpoint(AW_ENDPOINT)
      .setProject(AW_PROJECT_ID);
    const db = new Databases(client);
    await db.createDocument(AW_DATABASE_ID, AW_COLLECTION, ID.unique(), doc);
  } catch (err) {
    console.error('Appwrite error:', err);
    // still show thank you — don't block respondent
  }

  cur = SLIDES.length - 1;
  showSlide(cur, 1);
}

function optVal(id) {
  const s = SLIDES.find(x => x.id === id);
  const ans = answers[id];
  if (!s || ans === undefined) return '';
  return s.opts && s.opts[ans] ? s.opts[ans].en : String(ans);
}
function arrVal(id) {
  const s = SLIDES.find(x => x.id === id);
  const ans = answers[id];
  if (!s || !ans || !ans.length) return '';
  return ans.map(i => s.opts[i]?.en || i).join(', ');
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
buildAll();
showSlide(0, 1);
</script>
